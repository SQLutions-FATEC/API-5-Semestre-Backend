name: SonarCloud Analysis

on:
  push:
    branches: [ "main", "develop-1", "develop-2", "develop-3" ] 
  pull_request:
    types: [opened, synchronize, reopened]
  schedule:
    - cron: '0 2 * * 6' 

jobs:
  sonarcloud:
    name: SonarCloud Scan
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: api_db
          POSTGRES_USER: api_user
          POSTGRES_PASSWORD: senha_padrao
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # --- 1. SETUP PYTHON ---
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # --- 2. INSTALL DEPENDENCIES ---
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Adjust the path below if your requirements are not in the 'django' folder
          pip install -r django/requirements.txt
          pip install coverage

      # --- 3. RUN TESTS & GENERATE XML ---
      - name: Run tests and generate coverage
        env:
          DB_HOST: localhost
          POSTGRES_DB: api_db
          POSTGRES_USER: api_user
          POSTGRES_PASSWORD: senha_padrao
          DJANGO_SECRET_KEY: 'test-secret-key-for-github-actions'
        run: |
          cd django 
          coverage run manage.py test
          coverage xml -o coverage.xml

      # --- 4. RUN SONARCLOUD ---
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
