name: SonarCloud Analysis

on:
  push:
    branches: [ "main", "develop-1", "develop-2", "develop-3" ]
  pull_request:
    types: [opened, synchronize, reopened]
  schedule:
    - cron: '0 2 * * 6' 

jobs:
  sonarcloud:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 1. Prepara o Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # 2. Instala dependências e o Coverage
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install coverage pandas django
          # Se vocês tiverem o requirements.txt, descomente a linha abaixo:
          # pip install -r django/requirements.txt

      # 3. Roda os testes e gera o arquivo coverage.xml
      - name: Run tests and generate coverage report
        run: |
          cd django
          coverage run manage.py test etl
          coverage xml

      # 4. Envia tudo para o SonarCloud
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
