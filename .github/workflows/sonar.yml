name: SonarCloud Analysis

on:
  push:
    branches: [ "main", "develop-1", "develop-2", "develop-3" ]
  pull_request:
    types: [opened, synchronize, reopened]
  schedule:
    - cron: '0 2 * * 6' 

jobs:
  sonarcloud:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    
    # 1. Cria um banco de dados temporário no GitHub para os testes rodarem
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: api_db
          POSTGRES_USER: api_user
          POSTGRES_PASSWORD: senha_padrao
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # 2. Instala a biblioteca do Postgres (psycopg2-binary)
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install coverage pandas django psycopg2-binary

      # 3. Roda os testes conectando no banco temporário (localhost)
      - name: Run tests and generate coverage report
        env:
          DB_HOST: localhost
        run: |
          cd django
          coverage run manage.py test etl
          coverage xml

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
